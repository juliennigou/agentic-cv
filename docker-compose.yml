services:
  postgres:
    # Image PostgreSQL 16 avec l'extension pgvector intégrée (embeddings sémantiques).
    image: pgvector/pgvector:pg16
    container_name: agentic-cv-postgres
    environment:
      POSTGRES_DB: agentic_cv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_cv"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
