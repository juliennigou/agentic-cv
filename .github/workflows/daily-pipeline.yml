name: Daily pipeline

# Pipeline scrape → structure → embed → match.
#
# La planification quotidienne tourne sur le VPS (cf. deploy/README.md) ;
# ce workflow ne garde qu'un déclenchement MANUEL (workflow_dispatch), utile
# comme repli/test depuis GitHub. Il nécessite que Supabase et LiteLLM soient
# joignables depuis les runners GitHub (pooler IPv4 + endpoint LiteLLM public).
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   - DATABASE_URL              Postgres Supabase (transaction pooler, 6543)
#   - DIRECT_URL                Postgres Supabase (session pooler, 5432)
#   - LITELLM_BASE_URL          endpoint LiteLLM public (HTTPS)
#   - LITELLM_API_KEY           clé maître du proxy LiteLLM
#   - LITELLM_EMBEDDING_MODEL   (optionnel) défaut text-embedding-3-small
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    name: Scrape, structure, embed & match
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
      LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
      LITELLM_EMBEDDING_MODEL: ${{ secrets.LITELLM_EMBEDDING_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Apply migrations
        run: pnpm db:deploy

      - name: Run daily pipeline
        run: pnpm pipeline:job-offers
